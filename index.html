<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido de Baguettes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(#ffad66,#ff914d);
    padding:20px;
}

h1{
    text-align:center;
    color:#003b73;
    margin-bottom:20px;
}

.contenedor{

    width:95%;
    margin:auto;
    background:white;
    border-radius:10px;
    padding:15px;

    display:flex;
    gap:20px;
}

/* FORMULARIO */

.formulario{

    flex:3;

}

label{

    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
    font-size:14px;

}

select,
input[type=number]{

    width:100%;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;

}

/* PAN */

.pan{

    display:flex;
    flex-wrap:wrap;
    gap:10px;

}

.pan label{

    flex:0 0 calc(33.33% - 7px);

    background:#f5f5f5;
    padding:10px;
    border-radius:5px;

    font-weight:normal;
    font-size:13px;

}

/* INGREDIENTES */

.ingredientes{

    display:flex;
    flex-wrap:wrap;
    gap:10px;

}

.ingredientes label{

    flex:0 0 calc(33.33% - 7px);

    background:#f7f7f7;
    padding:8px;
    border-radius:5px;

    font-size:13px;
    font-weight:normal;

}

.total{

    margin-top:20px;
    background:#2d4059;
    color:white;

    text-align:center;

    padding:15px;

    border-radius:5px;

    font-size:24px;
    font-weight:bold;

}

button{

    width:100%;
    margin-top:12px;

    padding:12px;

    background:#ff7a3d;
    color:white;

    border:none;

    border-radius:5px;

    cursor:pointer;

    font-size:18px;

}

button:hover{

    background:#ff6422;

}

/* IMÁGENES */

.imagenes{

    flex:1;

    display:flex;
    flex-direction:column;
    gap:10px;

}

.imagenes img{

    width:100%;
    height:110px;
    object-fit:cover;
    border-radius:6px;

}

@media(max-width:900px){

.contenedor{

    flex-direction:column;

}

.pan label,
.ingredientes label{

    flex:0 0 100%;

}

}

</style>

</head>

<body>

<h1>Realiza tu Pedido de Baguettes</h1>

<div class="contenedor">

<div class="formulario">

<label>Especialidad:</label>

<select id="especialidad">

<option value="80">Clásica $80.00 MXN</option>
<option value="90">Hawaiana $90.00 MXN</option>
<option value="95">Italiana $95.00 MXN</option>
<option value="100">Mexicana $100.00 MXN</option>

</select>

<label>Tipo de Pan:</label>

<div class="pan">

<label><input type="radio" name="pan" value="0" checked> Clásico</label>

<label><input type="radio" name="pan" value="20"> Con Ajonjolí (+20)</label>

<label><input type="radio" name="pan" value="20"> Integral (+20)</label>

<label><input type="radio" name="pan" value="50"> Brioche (+50)</label>

</div>

<label>Ingredientes adicionales ($5 MXN c/u):</label>

<div class="ingredientes">

<label><input type="checkbox" value="5">Queso</label>
<label><input type="checkbox" value="5">Lechuga</label>
<label><input type="checkbox" value="5">Jitomate</label>

<label><input type="checkbox" value="5">Cebolla</label>
<label><input type="checkbox" value="5">Jalapeño</label>
<label><input type="checkbox" value="5">Huevo</label>

<label><input type="checkbox" value="5">Pepino</label>
<label><input type="checkbox" value="5">Champiñones</label>
<label><input type="checkbox" value="5">Tocino Extra</label>

<label><input type="checkbox" value="5">Doble Queso</label>
<label><input type="checkbox" value="5">Piña</label>
<label><input type="checkbox" value="5">Guacamole</label>

<label><input type="checkbox" value="5">Salsa BBQ</label>
<label><input type="checkbox" value="5">Aderezo Chipotle</label>
<label><input type="checkbox" value="5">Mayonesa</label>

<label><input type="checkbox" value="5">Mostaza</label>
<label><input type="checkbox" value="5">Ketchup</label>
<label><input type="checkbox" value="5">Pepperoni</label>

<label><input type="checkbox" value="5">Arúcula</label>
<label><input type="checkbox" value="5">Cebolla Caramelizada</label>

</div>

<label>Cantidad de Baguettes:</label>

<input type="number" id="cantidad" value="1" min="1">

<label>

<input type="checkbox" id="domicilio">

¿Es a domicilio? (+30 MXN)

</label>

<div class="total" id="total">

Total: $0.00

</div>

<button onclick="calcularTotal()">

Calcular Total

</button>

</div>

<div class="imagenes">

    <img src="https://images.unsplash.com/photo-1627308595229-7830a5c91f9?w=500" alt="Clásica">

    <img src="https://images.unsplash.com/photo-1509722747041-616f39b57569?w=500" alt="Hawaiana">

    <img src="https://images.unsplash.com/photo-1553909489-cd47e0907980?w=500" alt="Italiana">

    <img src="https://images.unsplash.com/photo-1608039755401-742074f0548d?w=500" alt="Mexicana">

    <img src="https://images.unsplash.com/photo-1619740455993-9e612b1af08a?w=500" alt="Vegetariana">

</div>

</div>

</div>

<script>

function calcularTotal(){

let especialidad = Number(document.getElementById("especialidad").value);

let pan = Number(document.querySelector('input[name="pan"]:checked').value);

let cantidad = Number(document.getElementById("cantidad").value);

if(cantidad<1){

cantidad=1;

}

let ingredientes = document.querySelectorAll(".ingredientes input");

let totalIngredientes = 0;

ingredientes.forEach(function(i){

if(i.checked){

totalIngredientes += Number(i.value);

}

});

let envio = 0;

if(document.getElementById("domicilio").checked){

envio = 30;

}

let subtotal = especialidad + pan + totalIngredientes;

let total = (subtotal * cantidad) + envio;

document.getElementById("total").innerHTML="Total: $" + total.toFixed(2);

}

</script>

</body>
</html>
